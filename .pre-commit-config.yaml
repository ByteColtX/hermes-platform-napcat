# .pre-commit-config.yaml
#
# Local pre-commit hooks for hermes-platform-napcat.
# All hooks run through uv, using the dependencies declared in pyproject.toml.
#
# Quick start:
#   uv sync
#   uv run pre-commit install
#   uv run pre-commit run --all-files
#
# The hook chain mirrors what CI should enforce:
#   1. ruff (lint)    — catches errors, unused imports, style issues
#   2. ruff (format)  — enforces consistent formatting
#   3. pytest         — runs the test suite

repos:
  # ruff: lint
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint)
        language: system
        entry: uv run ruff check --force-exclude
        types: [python]
        pass_filenames: true
        args: []

  # ruff: format
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff (format)
        language: system
        entry: uv run ruff format --check --force-exclude
        types: [python]
        pass_filenames: true

  # pytest
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        language: system
        entry: uv run pytest tests/ --tb=short -q
        types: [python]
        pass_filenames: false
        always_run: true